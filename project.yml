name: HICOR
options:
  bundleIdPrefix: com.creativearchives
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "26.1"
configs:
  Debug: debug
  Release: release
settings:
  base:
    DEVELOPMENT_TEAM: 7538YVB3M5
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    # CocoaPods' Embed Pods Frameworks script writes to non-output paths;
    # script sandboxing must be disabled for pod-integrated builds.
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  HICOR:
    type: application
    platform: iOS
    sources:
      - path: HICOR
        excludes:
          - "Documentation/**"
    resources:
      - path: HICOR/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.creativearchives.hicor
        CODE_SIGN_ENTITLEMENTS: HICOR/HICOR.entitlements
        DEVELOPMENT_TEAM: 7538YVB3M5
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: CLEAR
        INFOPLIST_KEY_NSCameraUsageDescription: "CLEAR uses the camera to photograph autorefractor printouts so your prescription can be measured."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "CLEAR saves OCR diagnostic crops to Photos so failing captures can be inspected."
        INFOPLIST_KEY_UIFileSharingEnabled: YES
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  HICORTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HICORTests
    resources:
      - path: HICORTests/OCR/Fixtures
        type: folder
        optional: true
    dependencies:
      - target: HICOR
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HICOR.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HICOR"
        GENERATE_INFOPLIST_FILE: YES
schemes:
  HICOR:
    build:
      targets:
        HICOR: all
        HICORTests: [test]
    test:
      targets:
        - HICORTests
    run:
      config: Debug
